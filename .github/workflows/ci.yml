name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Smoke test signal generator
        run: |
          python -c "
          import sys; sys.path.insert(0, 'src')
          from signal_generator import WeldSignalGenerator
          ws = WeldSignalGenerator(random_seed=42).generate()
          assert len(ws.df) > 0
          print('Smoke test passed:', ws.defect_type, ws.df.shape)
          "
